<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASM Image Kernel Lab</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <p class="eyebrow">Graphics Compute Sandbox</p>
        <h1>WASM Image Kernel Lab</h1>
        <p class="desc">Apply convolution kernels and benchmark a simulated JS vs WASM execution pipeline in the browser.</p>

        <div class="card">
          <h2>Kernel Preset</h2>
          <select id="kernelSelect">
            <option value="sharpen">Sharpen</option>
            <option value="blur">Gaussian Blur</option>
            <option value="edge">Edge Detect</option>
            <option value="emboss">Emboss</option>
          </select>
          <label>Intensity
            <input id="intensityInput" type="range" min="0.2" max="2.2" step="0.1" value="1.1" />
            <span id="intensityValue">1.1</span>
          </label>
        </div>

        <div class="card">
          <h2>Execution Mode</h2>
          <div class="row">
            <button id="jsBtn" class="active">JS Pipeline</button>
            <button id="wasmBtn">WASM Pipeline</button>
          </div>
          <button id="applyBtn">Apply Kernel</button>
          <button id="randomBtn">Random Texture</button>
        </div>

        <div class="card metrics">
          <h2>Profiler</h2>
          <p>Runtime: <strong id="runtimeText">0 ms</strong></p>
          <p>Throughput: <strong id="throughputText">0 MP/s</strong></p>
          <p>Pixel Diff: <strong id="diffText">0</strong></p>
        </div>
      </section>

      <section class="canvas-wrap">
        <div class="split">
          <article>
            <h2>Input</h2>
            <canvas id="inputCanvas" width="620" height="420"></canvas>
          </article>
          <article>
            <h2>Output</h2>
            <canvas id="outputCanvas" width="620" height="420"></canvas>
          </article>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
